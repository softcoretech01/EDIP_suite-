version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edip_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edip_db
      MYSQL_USER: edip_user
      MYSQL_PASSWORD: edip_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: edip_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mysql_data:
  qdrant_data:
